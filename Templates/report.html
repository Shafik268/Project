<!-- ================= FORM SECTION ================= -->

<section class="report-section">

<h1>Emergency Report Form</h1>

<p>

Please provide accurate information so emergency
response teams can act quickly.

</p>

<form>

<div class="form-group">

<label>Name</label>

<input
type="text"
placeholder="Enter your full name"
required>

</div>


<div class="form-group">

<label>Contact Number</label>

<input
type="tel"
placeholder="Enter your contact number"
required>

</div>


<div class="form-group">

<label>Disaster Type</label>

<select>

<option>Select Disaster</option>

<option>Flood</option>

<option>Fire</option>

<option>Earthquake</option>

<option>Cyclone</option>

<option>Landslide</option>

<option>Other</option>

</select>

</div>


<div class="form-group">

<label>Location</label>

<input
type="text"
placeholder="Enter location"
required>

</div>


<div class="form-group">

<label>Urgency</label>

<select>

<option>Low</option>

<option>Medium</option>

<option>High</option>

<option>Critical</option>

</select>

</div>


<div class="form-group">

<label>Description</label>

<textarea
rows="6"
placeholder="Describe the emergency"></textarea>

</div>


<button class="submit-btn">

Submit Report

</button>

</form>

</section>
