<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Emergency</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- ================= NAVBAR ================= -->

    <nav class="navbar">

        <div class="logo">
            🌍 Disaster Recovery Assistant
        </div>

        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/report">Report</a></li>
            <li><a href="/dashboard">Dashboard</a></li>
            <li><a href="/resources">Resources</a></li>
            <li><a href="/shelters">Shelters</a></li>
        </ul>

    </nav>

    <!-- ================= REPORT FORM ================= -->

    <section class="report-section">

        <h1>Emergency Report Form</h1>

        <p>
            Please provide accurate information so emergency response
            teams can act quickly.
        </p>

        <form action="/submit-report" method="POST">

            <!-- Name -->

            <div class="form-group">

                <label for="name">Full Name</label>

                <input
                    type="text"
                    id="name"
                    name="name"
                    placeholder="Enter your full name"
                    required>

            </div>

            <!-- Contact -->

            <div class="form-group">

                <label for="contact">Contact Number</label>

                <input
                    type="tel"
                    id="contact"
                    name="contact"
                    placeholder="Enter your contact number"
                    required>

            </div>

            <!-- Disaster Type -->

            <div class="form-group">

                <label for="disaster">Disaster Type</label>

                <select
                    id="disaster"
                    name="disaster"
                    required>

                    <option value="">Select Disaster</option>
                    <option value="Flood">Flood</option>
                    <option value="Fire">Fire</option>
                    <option value="Earthquake">Earthquake</option>
                    <option value="Cyclone">Cyclone</option>
                    <option value="Landslide">Landslide</option>
                    <option value="Other">Other</option>

                </select>

            </div>

            <!-- Location -->

            <div class="form-group">

                <label for="location">Location</label>

                <input
                    type="text"
                    id="location"
                    name="location"
                    placeholder="Enter the disaster location"
                    required>

            </div>

            <!-- Urgency -->

            <div class="form-group">

                <label for="urgency">Urgency Level</label>

                <select
                    id="urgency"
                    name="urgency"
                    required>

                    <option value="">Select Urgency</option>
                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                    <option value="Critical">Critical</option>

                </select>

            </div>

            <!-- Description -->

            <div class="form-group">

                <label for="description">Description</label>

                <textarea
                    id="description"
                    name="description"
                    rows="6"
                    placeholder="Describe the emergency in detail..."
                    required></textarea>

            </div>

            <!-- Submit -->

            <button
                type="submit"
                class="submit-btn">

                🚨 Submit Emergency Report

            </button>

        </form>

    </section>

    <!-- ================= FOOTER ================= -->

    <footer>

        <p>

            © 2026 Disaster Recovery Assistant | Odoo Hackathon Project

        </p>

    </footer>

</body>

</html>
